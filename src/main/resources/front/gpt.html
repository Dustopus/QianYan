<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>千言·GPT 风格</title>
    <style>
        :root {
            --bg: #343541;
            --sidebar-bg: #202123;
            --user-bg: #343541;
            --ai-bg: #444654;
            --text: #ececf1;
            --text-dim: #8e8ea0;
            --border: #4e4f60;
            --accent: #19c37d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; }
        .app { display: flex; height: 100vh; }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        .sidebar .new-chat {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: background 0.2s;
        }
        .sidebar .new-chat:hover { background: var(--ai-bg); }
        .session-list { flex: 1; overflow-y: auto; }
        .session-item {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 2px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-item:hover, .session-item.active { background: var(--ai-bg); color: var(--text); }
        .session-item .del-btn {
            display: none;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 13px;
            opacity: 0.6;
        }
        .session-item:hover .del-btn { display: inline; }

        .main { flex: 1; display: flex; flex-direction: column; }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .msg-row {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .msg-row.user { background: var(--user-bg); }
        .msg-row.ai { background: var(--ai-bg); }
        .msg-inner {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 16px;
            font-size: 15px;
            line-height: 1.6;
        }
        .avatar { width: 30px; height: 30px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .avatar.user { background: #5436da; }
        .avatar.ai { background: var(--accent); }

        .typing-dots span {
            animation: blink 1.4s infinite both;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        .mode-switch {
            position: absolute;
            right: 74px;
            bottom: 14px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1;
        }
        .mode-switch.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .input-bar {
            padding: 16px 0 24px;
            background: var(--bg);
        }
        .input-inner {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
        }
        .input-inner textarea {
            width: 100%;
            padding: 14px 48px 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--ai-bg);
            color: var(--text);
            font-size: 15px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
        }
        .input-inner textarea:focus { outline: none; border-color: var(--accent); }
        .input-inner .send {
            position: absolute;
            right: 32px;
            bottom: 10px;
            background: var(--accent);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-inner .send:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="new-chat" onclick="newChat()">＋ 新建对话</div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="main">
        <div class="messages" id="messages">
            <div class="msg-row ai"><div class="msg-inner"><div class="avatar ai">千</div><div>你好！我是千言 AI 助手，有什么可以帮你的？</div></div></div>
        </div>
        <div class="input-bar">
            <div class="input-inner">
                <textarea id="input" rows="1" placeholder="Send a message..." oninput="autoResize(this)"></textarea>
                <button class="mode-switch" id="modeBtn" onclick="toggleMode()" title="切换同步/流式">同步</button>
                <button class="send" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>
<script>
    let sid = 1, uid = Math.floor(Math.random()*100000)+100000, streaming = true, sending = false;
    const API = '/api';

    function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }

    function toggleMode(){
        streaming = !streaming;
        const btn = document.getElementById('modeBtn');
        btn.textContent = streaming ? '流式' : '同步';
        btn.classList.toggle('active', streaming);
    }

    function addMsg(text, isUser){
        const m = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row ' + (isUser ? 'user' : 'ai');
        row.innerHTML = `<div class="msg-inner"><div class="avatar ${isUser?'user':'ai'}">${isUser?'你':'千'}</div><div class="msg-content">${text}</div></div>`;
        m.appendChild(row);
        m.scrollTop = m.scrollHeight;
        return row.querySelector('.msg-content');
    }

    function addRow(isUser){
        const m = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row ' + (isUser ? 'user' : 'ai');
        row.innerHTML = `<div class="msg-inner"><div class="avatar ${isUser?'user':'ai'}">${isUser?'你':'千'}</div><div class="msg-content"></div></div>`;
        m.appendChild(row);
        m.scrollTop = m.scrollHeight;
        return row.querySelector('.msg-content');
    }

    async function send(){
        if(sending) return;
        const inp = document.getElementById('input');
        const t = inp.value.trim();
        if(!t) return;

        sending = true;
        addMsg(t, true);
        inp.value = '';
        inp.style.height = 'auto';

        if(streaming) await sendStream(t);
        else await sendSync(t);

        sending = false;
    }

    async function sendSync(t){
        const content = addRow(false);
        content.textContent = '思考中...';
        try {
            const r = await fetch(API + '/ai/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({memoryId: sid, message: t, userId: uid, sessionId: sid})
            });
            if(r.ok){
                const d = await r.json();
                if(d.code && d.code !== 200){
                    content.textContent = '⚠️ ' + (d.message || '请求处理异常');
                } else {
                    content.textContent = d.data || (typeof d === 'string' ? d : JSON.stringify(d));
                }
            } else {
                const err = await r.json().catch(() => null);
                content.textContent = '⚠️ ' + (err && err.message ? err.message : '请求失败: ' + r.status);
            }
        } catch(e){
            content.textContent = '错误: ' + e.message;
        }
    }

    async function sendStream(t){
        const content = addRow(false);
        content.innerHTML = '<span class="typing-dots"><span>●</span><span>●</span><span>●</span></span>';
        let fullText = '';
        try {
            const r = await fetch(API + '/ai/streamChat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Accept': 'text/event-stream'},
                body: JSON.stringify({memoryId: sid, message: t, userId: uid, sessionId: sid})
            });
            if(!r.ok){
                content.textContent = '请求失败: ' + r.status;
                return;
            }
            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            content.textContent = '';
            while(true){
                const {done, value} = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value, {stream: true});
                const lines = chunk.split('\n');
                for(const line of lines){
                    if(line.startsWith('data:')){
                        fullText += line.substring(5);
                    } else if(!line.startsWith('event:') && !line.startsWith('id:') && !line.startsWith(':')){
                        fullText += line;
                    }
                }
                content.textContent = fullText;
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
            if(!fullText.trim()) content.textContent = '（AI 未返回内容）';
        } catch(e){
            content.textContent = '流式接收错误: ' + e.message;
        }
    }

    function newChat(){
        sid++;
        document.getElementById('messages').innerHTML = '<div class="msg-row ai"><div class="msg-inner"><div class="avatar ai">千</div><div>新对话已开始！</div></div></div>';
    }

    document.getElementById('input').addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
    });

    // init mode button
    document.getElementById('modeBtn').textContent = '流式';
    document.getElementById('modeBtn').classList.add('active');
</script>
</body>
</html>
